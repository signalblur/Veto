name: Release

on:
  push:
    tags:
      - "v*"

# Empty top-level — every job declares its own minimal scope.
permissions: {}

# Don't cancel an in-flight release; let it finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reproducible-build:
    name: Reproducible build and publish
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write       # publish a GitHub Release
      id-token: write       # OIDC token for SLSA provenance
      attestations: write   # store the attestation
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin Xcode 16.0
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run VetoCore tests
        working-directory: Packages/VetoCore
        run: swift test --parallel

      - name: Build deterministically and verify reproducibility
        run: scripts/test-bundle-hash.sh

      - name: Compute bundle hash
        id: hashes
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          APP_PATH="build/Veto.xcarchive/Products/Applications/Veto.app"
          BUNDLE_HASH=$(scripts/bundle-hash.sh "$APP_PATH")
          echo "bundle_hash=$BUNDLE_HASH" >> "$GITHUB_OUTPUT"
          echo "$BUNDLE_HASH" > bundle-hash.txt
          {
            echo "## Veto release artifacts"
            echo
            echo "| Resource | Hash |"
            echo "|----------|------|"
            echo "| Bundle (packs + .mlmodelc) | \`$BUNDLE_HASH\` |"
            echo
            echo "Verify on a device by comparing this value to the one shown on the About screen."
            echo
            echo "End-to-end verifier:"
            echo
            echo '```'
            echo "scripts/verify-build.sh $COMMIT_SHA $BUNDLE_HASH"
            echo '```'
          } > release-notes.md

      - name: Zip the unsigned archive
        run: cd build && zip -qr Veto.xcarchive.zip Veto.xcarchive

      - name: Generate SLSA build provenance for the archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: build/Veto.xcarchive.zip

      - name: Generate SLSA build provenance for the bundle hash file
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: bundle-hash.txt

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.0.x
        with:
          files: |
            build/Veto.xcarchive.zip
            bundle-hash.txt
          body_path: release-notes.md
          fail_on_unmatched_files: true
