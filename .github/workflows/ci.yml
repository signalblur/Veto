name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Empty top-level — every job declares its own minimal scope.
permissions: {}

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vetocore-tests:
    name: VetoCore (swift test)
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Run VetoCore tests
        working-directory: Packages/VetoCore
        run: swift test --parallel

  privacy-grep:
    name: Privacy invariants (no network / no logging / no contacts)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: No URLSession or Network framework anywhere in source
        run: |
          ! grep -rE "URLSession|import Network|NSURLConnection|CFNetwork" \
            VetoFilterExtension/ Packages/VetoCore/Sources/

      - name: No print, os_log, Logger, or NSLog anywhere in source
        run: |
          ! grep -rE "\bprint\(|\bos_log\b|\bLogger\.|\bNSLog\b|\bOSLog\b" \
            Veto/ VetoFilterExtension/ Packages/VetoCore/Sources/

      - name: No Contacts permission or API anywhere
        run: |
          ! grep -rE "NSContactsUsageDescription|CNContactStore|import Contacts" \
            Veto/ VetoFilterExtension/ Packages/VetoCore/

      - name: No forbidden message-store paths anywhere
        run: |
          ! grep -rE "Library/Messages|MobileSMS|chat\.db|NSHomeDirectory|com\.apple\.MobileSMS" \
            Veto/ VetoFilterExtension/ Packages/VetoCore/Sources/ Packages/VetoCore/Tests/

      - name: No IDMessageFilterExtensionNetworkURL key declared
        # Matches the key as it would actually appear (YAML colon-suffixed or
        # plist <key>-wrapped) so the documentation comment in project.yml
        # warning against adding the key is not a false positive.
        run: |
          ! grep -rE "IDMessageFilterExtensionNetworkURL[[:space:]]*:|<key>IDMessageFilterExtensionNetworkURL</key>" \
            VetoFilterExtension/ project.yml
