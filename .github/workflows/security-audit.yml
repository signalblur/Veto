name: Security Audit

on:
  pull_request:
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  push:
    branches: [main]
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  schedule:
    # Mondays at 06:00 UTC, picks up new advisories without waiting on a PR.
    - cron: "0 6 * * 1"

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-security:
    name: zizmor + actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install 'zizmor==1.5.2'

      - name: Run zizmor (workflow security analysis)
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e  # v3
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Install actionlint (pinned to v1.7.7)
        run: |
          curl -fsSL --retry 3 -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          install -m 0755 actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Run actionlint
        run: actionlint -color

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2  # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e  # v3
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: scorecard
