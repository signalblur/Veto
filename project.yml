name: Veto
options:
  bundleIdPrefix: com.liesabove.veto
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"

packages:
  VetoCore:
    path: Packages/VetoCore

targets:
  Veto:
    type: application
    platform: iOS
    sources:
      - path: Veto
    resources:
      - path: Veto/Resources
        optional: true
    info:
      path: Veto/Info.plist
      properties:
        CFBundleDisplayName: Veto
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        ITSAppUsesNonExemptEncryption: false
        VetoSourceSHA: $(VETO_SOURCE_SHA)
        VetoSourceRepoURL: $(VETO_SOURCE_REPO_URL)
    entitlements:
      path: Veto/Veto.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.liesabove.veto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liesabove.veto
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: Veto/Veto.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: VetoFilterExtension
        embed: true
      - package: VetoCore
    preBuildScripts:
      - name: Embed Source SHA
        script: |
          "$SRCROOT/scripts/embed-source-sha.sh"
        outputFiles:
          - $(DERIVED_FILE_DIR)/.veto-source-sha-stamp
        basedOnDependencyAnalysis: false

  VetoFilterExtension:
    type: app-extension.message-filter
    platform: iOS
    sources:
      - path: VetoFilterExtension
    info:
      path: VetoFilterExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.identitylookup.message-filter
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FilterExtension
          # IMPORTANT: do NOT add IDMessageFilterExtensionNetworkURL — that would enable
          # network access in the extension. Veto must remain fully on-device.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: VetoFilterExtension/VetoFilterExtension.entitlements
      properties:
        com.apple.developer.IdentityLookup.message-filter: true
        com.apple.security.application-groups:
          - group.com.liesabove.veto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liesabove.veto.filter
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: VetoFilterExtension/VetoFilterExtension.entitlements
    dependencies:
      - package: VetoCore
